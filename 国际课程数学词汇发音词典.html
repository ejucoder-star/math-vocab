// ── Topic & Category config ───────────────────────────────────
const TOPICS = [...new Set(ALL.map(v => v[0]))];

const TOPIC_COLOR = {
  "代数与函数":  "#1A5C38",
  "坐标几何":    "#2E4A8B",
  "三角学":      "#6B2D8B",
  "指数与对数":  "#8B4500",
  "微积分":      "#8B1A1A",
  "向量":        "#1A6B6B",
  "概率与统计":  "#1A3D6B",
  "力学":        "#4A4A1A",
  "矩阵":        "#3D1A6B",
  "几何":        "#1A4A4A",
};

function topicColor(t) { return TOPIC_COLOR[t] || "#1F3864"; }
function lighten(hex) {
  // return very light version
  const map = {
    "#1A5C38":"#E8F5EE","#2E4A8B":"#EBF0FB","#6B2D8B":"#F3EBF9",
    "#8B4500":"#FBF0E8","#8B1A1A":"#FCEAEA","#1A6B6B":"#E8F5F5",
    "#1A3D6B":"#E8EEF9","#4A4A1A":"#F5F5E8","#3D1A6B":"#F0E8F9",
    "#1A4A4A":"#E8F5F5",
  };
  return map[hex] || "#F5F5F5";
}

// ── TTS ───────────────────────────────────────────────────────
let britishVoice = null;
function loadVoices() {
  const vs = speechSynthesis.getVoices();
  const picks = [
    v => v.lang==='en-GB' && /Daniel|Google/.test(v.name),
    v => v.lang==='en-GB',
    v => v.lang.startsWith('en'),
  ];
  for (const fn of picks) { const f=vs.find(fn); if(f){britishVoice=f;break;} }
  const badge = document.getElementById('voiceBadge');
  badge.textContent = britishVoice ? `🔊 ${britishVoice.name}` : '🔊 系统语音';
  badge.style.color = britishVoice ? '#1A6B6B' : '#888';
}
if (speechSynthesis.onvoiceschanged !== undefined)
  speechSynthesis.onvoiceschanged = loadVoices;
setTimeout(loadVoices, 600);

let activeBtn = null;
function speak(word, btn) {
  speechSynthesis.cancel();
  if (activeBtn) { activeBtn.classList.remove('speaking'); activeBtn.innerHTML = icon()+'播放'; }
  if (activeBtn === btn) { activeBtn = null; return; }
  const u = new SpeechSynthesisUtterance(word);
  u.lang = 'en-GB'; u.rate = 0.85;
  if (britishVoice) u.voice = britishVoice;
  btn.classList.add('speaking'); btn.innerHTML = icon()+'播放中…'; activeBtn = btn;
  u.onend = u.onerror = () => {
    btn.classList.remove('speaking'); btn.innerHTML = icon()+'播放';
    if (activeBtn===btn) activeBtn = null;
  };
  speechSynthesis.speak(u);
}

function icon() {
  return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>`;
}

function cambridgeUrl(en) {
  return 'https://dictionary.cambridge.org/dictionary/english/' +
    en.split('(')[0].split('/')[0].trim().toLowerCase().replace(/[\s']/g, w => w===' ' ? '-' : '');
}

// ── Build UI ──────────────────────────────────────────────────
const tabsEl = document.getElementById('topicTabs');
const mainEl = document.getElementById('mainContent');
let allRows = [];
let activeTopic = 'all';

// All tab
const allTab = document.createElement('button');
allTab.className = 'tab active'; allTab.textContent = '全部';
allTab.style.background = '#1F3864'; allTab.style.color = 'white'; allTab.style.borderColor = '#1F3864';
allTab.onclick = () => setTopic('all', allTab);
tabsEl.appendChild(allTab);

// Topic tabs
TOPICS.forEach(t => {
  const btn = document.createElement('button');
  btn.className = 'tab'; btn.textContent = t;
  btn.style.color = topicColor(t); btn.style.borderColor = topicColor(t);
  btn.onclick = () => setTopic(t, btn);
  tabsEl.appendChild(btn);
});

// Build sections per topic then per category
TOPICS.forEach(topic => {
  const tc = topicColor(topic);
  const topicItems = ALL.filter(v => v[0] === topic);
  const cats = [...new Set(topicItems.map(v => v[1]))];

  const section = document.createElement('div');
  section.className = 'topic-section'; section.dataset.topic = topic;

  const th = document.createElement('div');
  th.className = 'topic-header';
  th.style.background = `linear-gradient(135deg, ${tc}, ${tc}cc)`;
  const count = topicItems.length;
  th.innerHTML = `<span>📚 ${topic}</span><span class="badge">${count} 词</span>`;
  section.appendChild(th);

  const table = document.createElement('table');
  const thead = document.createElement('thead');
  thead.innerHTML = `<tr style="background:${tc}cc">
    <th style="width:6%">类别</th>
    <th style="width:20%">英文术语</th>
    <th style="width:20%">国际音标 IPA</th>
    <th style="width:10%">中文</th>
    <th style="width:26%">备注</th>
    <th style="width:18%;text-align:center">发音</th>
  </tr>`;
  table.appendChild(thead);

  const tbody = document.createElement('tbody');
  let prevCat = '';
  topicItems.forEach(item => {
    const [, cat, en, ipa, zh, note] = item;
    const tr = document.createElement('tr');
    tr.dataset.topic = topic; tr.dataset.cat = cat;
    tr.dataset.en = en.toLowerCase(); tr.dataset.ipa = ipa; tr.dataset.zh = zh;

    const playWord = en.split('(')[0].split('/')[0].trim();
    const showCat = cat !== prevCat;
    prevCat = cat;

    tr.innerHTML = `
      <td style="font-size:0.72rem;color:${tc};font-weight:600;white-space:nowrap">${showCat ? cat : ''}</td>
      <td class="td-en">${en}</td>
      <td class="td-ipa">${ipa}</td>
      <td class="td-zh">${zh}</td>
      <td class="td-note">${note}</td>
      <td style="text-align:center">
        <div style="display:flex;flex-direction:column;align-items:center;gap:3px">
          <button class="play-btn" style="color:${tc};border-color:${tc}"
            onclick="speak('${playWord.replace(/'/g,"\\'")}',this)">
            ${icon()}播放
          </button>
          <a class="cambridge-link" href="${cambridgeUrl(en)}" target="_blank">📖 剑桥</a>
        </div>
      </td>`;
    tbody.appendChild(tr);
    allRows.push(tr);
  });

  table.appendChild(tbody);
  section.appendChild(table);
  mainEl.appendChild(section);
});

updateCount();

// ── Filter ────────────────────────────────────────────────────
function setTopic(t, btn) {
  activeTopic = t;
  document.querySelectorAll('.tab').forEach(b => {
    b.classList.remove('active');
    b.style.background = 'white';
    const isAll = b.textContent === '全部';
    b.style.color = isAll ? '#1F3864' : (TOPIC_COLOR[b.textContent] || '#333');
    b.style.borderColor = isAll ? '#1F3864' : (TOPIC_COLOR[b.textContent] || '#ccc');
  });
  btn.classList.add('active');
  btn.style.background = t === 'all' ? '#1F3864' : topicColor(t);
  btn.style.color = 'white'; btn.style.borderColor = 'transparent';
  document.querySelectorAll('.topic-section').forEach(s => {
    s.classList.toggle('hidden', t !== 'all' && s.dataset.topic !== t);
  });
  doFilter();
}

function doFilter() {
  const q = document.getElementById('searchInput').value.toLowerCase().trim();
  let vis = 0;
  allRows.forEach(tr => {
    const topicMatch = activeTopic === 'all' || tr.dataset.topic === activeTopic;
    const textMatch = !q || tr.dataset.en.includes(q) || tr.dataset.ipa.toLowerCase().includes(q) || tr.dataset.zh.includes(q);
    const show = topicMatch && textMatch;
    tr.classList.toggle('hidden', !show);
    if (show) vis++;
  });
  document.querySelectorAll('.topic-section').forEach(s => {
    if (activeTopic !== 'all' && s.dataset.topic !== activeTopic) return;
    const hasVis = [...s.querySelectorAll('tbody tr')].some(r => !r.classList.contains('hidden'));
    if (!s.classList.contains('hidden')) s.style.display = hasVis ? '' : 'none';
  });
  updateCount(vis);
}

function updateCount(n) {
  document.getElementById('visCount').textContent = n !== undefined ? n : allRows.length;
}
</script>
